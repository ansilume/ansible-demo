---
# Install Docker CE from the official Docker repository.
# Supports Debian/Ubuntu (apt) and RHEL/CentOS/Rocky/Fedora (dnf).
# After installation, Docker is started and enabled.
#
# Variables:
#   docker_users: list of usernames to add to the docker group (default: [])
#
# Example extra vars:
#   {"docker_users": ["deploy", "ubuntu"]}

- name: Install Docker CE
  hosts: all
  become: true
  gather_facts: true

  vars:
    docker_users: []

  tasks:
    # -------------------------------------------------------------------------
    # Debian / Ubuntu
    # -------------------------------------------------------------------------
    - name: Remove conflicting packages (Debian/Ubuntu)
      ansible.builtin.apt:
        name:
          - docker.io
          - docker-doc
          - docker-compose
          - podman-docker
          - containerd
          - runc
        state: absent
      when: ansible_os_family == "Debian"

    - name: Install apt prerequisites (Debian/Ubuntu)
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: true
      when: ansible_os_family == "Debian"

    - name: Create /etc/apt/keyrings
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"
      when: ansible_os_family == "Debian"

    - name: Add Docker GPG key (Debian/Ubuntu)
      ansible.builtin.shell: |
        curl -fsSL https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg \
          | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        chmod a+r /etc/apt/keyrings/docker.gpg
      args:
        creates: /etc/apt/keyrings/docker.gpg
      when: ansible_os_family == "Debian"

    - name: Add Docker apt repository (Debian/Ubuntu)
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') }}
          signed-by=/etc/apt/keyrings/docker.gpg]
          https://download.docker.com/linux/{{ ansible_distribution | lower }}
          {{ ansible_distribution_release }} stable
        filename: docker
        state: present
      when: ansible_os_family == "Debian"

    - name: Install Docker CE packages (Debian/Ubuntu)
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true
      when: ansible_os_family == "Debian"

    # -------------------------------------------------------------------------
    # RHEL / CentOS / Rocky / Fedora
    # -------------------------------------------------------------------------
    - name: Remove conflicting packages (RHEL/CentOS/Rocky/Fedora)
      ansible.builtin.dnf:
        name:
          - docker
          - docker-client
          - docker-client-latest
          - docker-common
          - docker-latest
          - docker-latest-logrotate
          - docker-logrotate
          - docker-engine
          - podman
          - runc
        state: absent
      when: ansible_os_family == "RedHat"

    - name: Install dnf-plugins-core (RHEL/CentOS/Rocky/Fedora)
      ansible.builtin.dnf:
        name: dnf-plugins-core
        state: present
      when: ansible_os_family == "RedHat"

    - name: Add Docker CE repository (RHEL/CentOS/Rocky/Fedora)
      ansible.builtin.command:
        cmd: dnf config-manager --add-repo https://download.docker.com/linux/centos/docker-ce.repo
        creates: /etc/yum.repos.d/docker-ce.repo
      when: ansible_os_family == "RedHat"

    - name: Install Docker CE packages (RHEL/CentOS/Rocky/Fedora)
      ansible.builtin.dnf:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
      when: ansible_os_family == "RedHat"

    # -------------------------------------------------------------------------
    # Common
    # -------------------------------------------------------------------------
    - name: Start and enable Docker
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Add users to docker group
      ansible.builtin.user:
        name: "{{ item }}"
        groups: docker
        append: true
      loop: "{{ docker_users }}"
      when: docker_users | length > 0
