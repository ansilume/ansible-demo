---
# Install nginx from the distribution package manager and ensure it is
# started and enabled on the target hosts.
# Supports Debian/Ubuntu (apt) and RHEL/CentOS/Rocky/Fedora (dnf).

- name: Install and start nginx
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: Install nginx (Debian/Ubuntu)
      ansible.builtin.apt:
        name: nginx
        state: present
        update_cache: true
      when: ansible_os_family == "Debian"

    - name: Install nginx (RHEL/CentOS/Rocky/Fedora)
      ansible.builtin.dnf:
        name: nginx
        state: present
      when: ansible_os_family == "RedHat"

    - name: Start and enable nginx
      ansible.builtin.service:
        name: nginx
        state: started
        enabled: true
