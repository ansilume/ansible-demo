---
- name: Load OS-specific variables
  ansible.builtin.include_vars: "{{ ansible_facts['os_family'] | lower }}.yaml"

- name: Install common packages on Debian-family systems
  ansible.builtin.apt:
    name: "{{ _common_os_packages + common_packages }}"
    state: present
    update_cache: "{{ common_update_cache }}"
    cache_valid_time: 3600
  when: ansible_facts['os_family'] == 'Debian'

- name: Install common packages on RedHat-family systems
  ansible.builtin.dnf:
    name: "{{ _common_os_packages + common_packages }}"
    state: present
  when: ansible_facts['os_family'] == 'RedHat'

- name: Add SSH authorized keys
  ansible.posix.authorized_key:
    user: "{{ item.user | default('root') }}"
    key: "{{ item.key }}"
    state: present
  loop: "{{ common_ssh_keys }}"
