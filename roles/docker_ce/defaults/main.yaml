---
docker_users: []
docker_service_name: docker
docker_service_enabled: true
docker_service_state: started

# Debian-family package lists
docker_debian_prereq_packages:
  - ca-certificates
  - curl

docker_debian_conflicting_packages:
  - docker.io
  - docker-doc
  - docker-compose
  - podman-docker
  - containerd
  - runc

docker_debian_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin

# RedHat-family package lists
docker_redhat_conflicting_packages:
  - docker
  - docker-client
  - docker-client-latest
  - docker-common
  - docker-latest
  - docker-latest-logrotate
  - docker-logrotate
  - docker-engine
  - podman
  - runc

docker_redhat_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin
