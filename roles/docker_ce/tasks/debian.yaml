---
- name: Remove conflicting Docker packages on Debian
  ansible.builtin.apt:
    name: "{{ docker_ce_debian_conflicting_packages }}"
    state: absent

- name: Install Docker prerequisites on Debian
  ansible.builtin.apt:
    name: "{{ docker_ce_debian_prereq_packages }}"
    state: present
    update_cache: true

- name: Create APT keyring directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download Docker GPG key
  ansible.builtin.get_url:
    url: "https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }}/gpg"
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Add Docker APT repository
  ansible.builtin.deb822_repository:
    name: docker
    types: [deb]
    uris: "https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }}"
    signed_by: /etc/apt/keyrings/docker.asc
    suites: ["{{ ansible_facts['distribution_release'] }}"]
    components: [stable]
    architectures:
      - "{{ _docker_ce_arch_map[ansible_facts['architecture']] | default(ansible_facts['architecture']) }}"
    state: present
    enabled: true

- name: Install Docker CE on Debian
  ansible.builtin.apt:
    name: "{{ docker_ce_debian_packages }}"
    state: present
    update_cache: true
