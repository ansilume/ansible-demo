---
- name: Remove conflicting Docker packages on Debian
  ansible.builtin.apt:
    name: "{{ docker_debian_conflicting_packages }}"
    state: absent

- name: Install Docker prerequisites on Debian
  ansible.builtin.apt:
    name: "{{ docker_debian_prereq_packages }}"
    state: present
    update_cache: true

- name: Create APT keyring directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download Docker GPG key
  ansible.builtin.get_url:
    url: "https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg"
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Add Docker APT repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ _docker_arch_map[ansible_architecture] | default(ansible_architecture) }}
      signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/{{ ansible_distribution | lower }}
      {{ ansible_distribution_release }} stable
    state: present
    filename: docker

- name: Install Docker CE on Debian
  ansible.builtin.apt:
    name: "{{ docker_debian_packages }}"
    state: present
    update_cache: true
