---
- name: Remove conflicting Docker packages on Debian
  ansible.builtin.apt:
    name: "{{ docker_ce_debian_conflicting_packages }}"
    state: absent

- name: Install Docker prerequisites on Debian
  ansible.builtin.apt:
    name: "{{ docker_ce_debian_prereq_packages }}"
    state: present
    update_cache: true

- name: Create APT keyring directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download Docker GPG key
  ansible.builtin.get_url:
    url: "https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }}/gpg"
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Add Docker APT repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ _docker_ce_arch_map[ansible_facts['architecture']] | default(ansible_facts['architecture']) }}
      signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }}
      {{ ansible_facts['distribution_release'] }} stable
    state: present
    filename: docker

- name: Install Docker CE on Debian
  ansible.builtin.apt:
    name: "{{ docker_ce_debian_packages }}"
    state: present
    update_cache: true
