---
- name: Remove conflicting Docker packages on RedHat
  ansible.builtin.dnf:
    name: "{{ docker_redhat_conflicting_packages }}"
    state: absent

- name: Add Docker CE repository on RedHat
  ansible.builtin.yum_repository:
    name: docker-ce-stable
    description: Docker CE Stable
    baseurl: "https://download.docker.com/linux/centos/$releasever/$basearch/stable"
    gpgcheck: true
    gpgkey: "https://download.docker.com/linux/centos/gpg"
    enabled: true

- name: Install Docker CE on RedHat
  ansible.builtin.dnf:
    name: "{{ docker_redhat_packages }}"
    state: present
