---
# Mandatory /etc/hosts entries — always written.
# Each entry is a raw line, e.g. "192.168.1.10  db01 db01.example.com"
hostsfile_servers_mandatory: []

# Optional /etc/hosts entries — written when provided.
hostsfile_servers_optional: []

# Set to true when running inside containers (Docker, Podman, LXC, k8s).
# Containers bind-mount /etc/hosts, which prevents atomic rename.
# unsafe_writes falls back to in-place write, avoiding "Device or resource
# busy" (Errno 16) errors.
hostsfile_unsafe_writes: false
