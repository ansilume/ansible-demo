---
- name: Set up 1Password CLI repository on Debian-family systems
  when: ansible_facts['os_family'] == "Debian"
  block:
    - name: Install prerequisites for 1Password APT repository
      ansible.builtin.apt:
        name: "{{ onepassword_cli_debian_prerequisites }}"
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Create APT keyring directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Download 1Password GPG key for APT
      ansible.builtin.get_url:
        url: https://downloads.1password.com/linux/keys/1password.asc
        dest: /etc/apt/keyrings/1password-archive-keyring.asc
        mode: "0644"

    - name: Add 1Password APT repository
      ansible.builtin.deb822_repository:
        name: 1password
        types: [deb]
        uris: "https://downloads.1password.com/linux/debian/{{ ansible_facts['dpkg_architecture'] | default('amd64') }}"
        signed_by: /etc/apt/keyrings/1password-archive-keyring.asc
        suites: [stable]
        components: [main]
        architectures:
          - "{{ ansible_facts['dpkg_architecture'] | default('amd64') }}"
        state: present
        enabled: true

    - name: Create debsig-verify policy directory
      ansible.builtin.file:
        path: /etc/debsig/policies/AC2D62742012EA22
        state: directory
        mode: "0755"

    - name: Download 1Password debsig-verify policy
      ansible.builtin.get_url:
        url: https://downloads.1password.com/linux/debian/debsig/1password.pol
        dest: /etc/debsig/policies/AC2D62742012EA22/1password.pol
        mode: "0644"

    - name: Create debsig keyring directory
      ansible.builtin.file:
        path: /usr/share/debsig/keyrings/AC2D62742012EA22
        state: directory
        mode: "0755"

    - name: Download 1Password signing key for debsig-verify
      ansible.builtin.get_url:
        url: https://downloads.1password.com/linux/keys/1password.asc
        dest: /usr/share/debsig/keyrings/AC2D62742012EA22/debsig.asc
        mode: "0644"

    # gpg --dearmor is required because the 1Password debsig policy
    # references debsig.gpg (binary format). No Ansible module exists
    # for GPG key dearmoring.
    - name: Dearmor 1Password signing key for debsig-verify
      ansible.builtin.command:
        cmd: >-
          gpg --batch --yes --dearmor
          -o /usr/share/debsig/keyrings/AC2D62742012EA22/debsig.gpg
          /usr/share/debsig/keyrings/AC2D62742012EA22/debsig.asc
        creates: /usr/share/debsig/keyrings/AC2D62742012EA22/debsig.gpg

- name: Set up 1Password CLI repository on RedHat-family systems
  when: ansible_facts['os_family'] == "RedHat"
  block:
    - name: Import 1Password GPG key on RedHat
      ansible.builtin.rpm_key:
        key: https://downloads.1password.com/linux/keys/1password.asc
        state: present

    - name: Add 1Password YUM repository
      ansible.builtin.yum_repository:
        name: 1password
        description: 1Password CLI Stable
        baseurl: https://downloads.1password.com/linux/rpm/stable/$basearch
        gpgcheck: true
        gpgkey: https://downloads.1password.com/linux/keys/1password.asc
        enabled: true
        repo_gpgcheck: true

- name: Install 1Password CLI
  ansible.builtin.package:
    name: "{{ onepassword_cli_package_name }}"
    state: present
