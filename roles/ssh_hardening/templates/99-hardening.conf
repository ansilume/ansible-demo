# {{ ansible_managed }}
Port {{ ssh_hardening_port }}
PermitRootLogin {{ ssh_hardening_permit_root_login }}
PasswordAuthentication {{ 'yes' if ssh_hardening_password_authentication else 'no' }}
PubkeyAuthentication {{ 'yes' if ssh_hardening_pubkey_authentication else 'no' }}
PermitEmptyPasswords {{ 'yes' if ssh_hardening_permit_empty_passwords else 'no' }}
KbdInteractiveAuthentication {{ 'yes' if ssh_hardening_kbd_interactive_authentication else 'no' }}
KerberosAuthentication {{ 'yes' if ssh_hardening_kerberos_authentication else 'no' }}
GSSAPIAuthentication {{ 'yes' if ssh_hardening_gssapi_authentication else 'no' }}
X11Forwarding {{ 'yes' if ssh_hardening_x11_forwarding else 'no' }}
AllowTcpForwarding {{ 'yes' if ssh_hardening_allow_tcp_forwarding else 'no' }}
AllowAgentForwarding {{ 'yes' if ssh_hardening_allow_agent_forwarding else 'no' }}
MaxAuthTries {{ ssh_hardening_max_auth_tries }}
LoginGraceTime {{ ssh_hardening_login_grace_time }}
ClientAliveInterval {{ ssh_hardening_client_alive_interval }}
ClientAliveCountMax {{ ssh_hardening_client_alive_count_max }}
{% if ssh_hardening_allow_users %}
AllowUsers {{ ssh_hardening_allow_users | join(' ') }}
{% endif %}
{% if ssh_hardening_allow_groups %}
AllowGroups {{ ssh_hardening_allow_groups | join(' ') }}
{% endif %}
{% if ssh_hardening_deny_users %}
DenyUsers {{ ssh_hardening_deny_users | join(' ') }}
{% endif %}
{% if ssh_hardening_deny_groups %}
DenyGroups {{ ssh_hardening_deny_groups | join(' ') }}
{% endif %}
