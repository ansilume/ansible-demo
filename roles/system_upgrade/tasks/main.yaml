---
- name: Upgrade packages on Debian-family systems (dist)
  ansible.builtin.apt:
    upgrade: dist
    update_cache: true
  when:
    - ansible_os_family == "Debian"
    - upgrade_type == "dist"

- name: Upgrade packages on Debian-family systems (safe)
  ansible.builtin.apt:
    upgrade: safe
    update_cache: true
  when:
    - ansible_os_family == "Debian"
    - upgrade_type == "safe"

- name: Upgrade all packages on RedHat-family systems
  ansible.builtin.dnf:
    name: "*"
    state: latest # noqa: package-latest
  when: ansible_os_family == "RedHat"

- name: Check for pending reboot on Debian-family systems
  ansible.builtin.stat:
    path: /var/run/reboot-required
  register: reboot_required_file
  when: ansible_os_family == "Debian"

- name: Notify if reboot is required
  ansible.builtin.debug:
    msg: "A reboot is required to complete the upgrade."
  when:
    - ansible_os_family == "Debian"
    - reboot_required_file.stat is defined
    - reboot_required_file.stat.exists
