---
- name: Verify system_user_name is set
  ansible.builtin.fail:
    msg: "Variable 'system_user_name' must be set to a non-empty username."
  when: not system_user_name

- name: Create user account
  ansible.builtin.user:
    name: "{{ system_user_name }}"
    shell: "{{ system_user_shell }}"
    state: present

- name: Configure passwordless sudo for user
  ansible.builtin.copy:
    content: "{{ system_user_name }} ALL=(ALL) NOPASSWD:ALL\n"
    dest: "/etc/sudoers.d/{{ system_user_name }}"
    owner: root
    group: root
    mode: "0440"
    validate: visudo -cf %s
  when: system_user_sudo | bool

- name: Add SSH public key for user
  ansible.posix.authorized_key:
    user: "{{ system_user_name }}"
    key: "{{ system_user_pubkey }}"
    state: present
  when: system_user_pubkey | length > 0
